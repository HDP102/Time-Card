- description: INFORMATICA-SMTP   # Human-readable ACL identifier
    action: Permit                   # Action to take (Permit/Deny)
    protocol: tcp                    # Network protocol (tcp/udp/icmp/etc.)
    ace_position: null               # ACL entry position (null = auto-assign)

    # Source configuration: Multiple hosts
    source:
      type: host                     # Type remains 'host' but value is now a list
      value:                         # Array of Source IP addresses
        - 10.24.0.135
        - 10.24.0.136
        - 10.24.0.137
        - 10.24.0.138
        - 10.24.128.135
        - 10.24.128.137
        - 10.24.128.155
        - 10.24.128.156
        - 10.24.128.157

    # Destination configuration: Single host address
    dest:
      type: host                     # Address type: 'subnet' for network ranges
      value:
        - 10.16.128.76                # aurora_owa.countryfinancial.com

    # Source port configuration: Multiple specific ports
    source_port:
      type: any                       # Port type: 'list' for multiple specific ports

    # Destination port configuration: Single specific port
    dest_port:
      type: list                      # Port type: 'list' (even for single port)
      ports:
        - 12025                       # 12025_TCP